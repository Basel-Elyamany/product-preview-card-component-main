<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Product preview card component</title>

        <!-- Feel free to remove these styles or customize in your own stylesheet 👍 -->
        <style>
            .attribution {
                font-size: 11px;
                text-align: center;
            }
            .attribution a {
                color: hsl(228, 45%, 44%);
            }
        </style>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <div class="product">
                <img class="product__img" src="images/image-product-mobile.jpg" alt="" />
            </div>
            <div class="container">
                <div class="category">Perfume</div>
                <h1>Gabrielle Essence Eau De Perfume</h1>
                <p>
                    A floral, solar and voluptuous interpretation composed by
                    Olivier Polge, Perfumer-Creator for the House of CHANEL.
                </p>
                <div class="price">
                    <span class="discount-price">$149.99</span>
                    <span class="original-price"><s>$169.99</s></span>
                </div>
                <button><img class="cart" src="images/icon-cart.svg" alt="">Add to Cart</button>
            </div>
        </main>
    </body>
</html>
